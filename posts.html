        <script>
            var btns = document.getElementsByClassName("bib-button");
            var i;

            for (i = 0; i < btns.length; i++) {
                const btn = btns[i];
                btn.addEventListener("click", async function() {
                  const icon = btn.querySelector("i");
                  const content = btn.nextElementSibling;
                  const bibtex = content.querySelector("code");

                  icon.classList.toggle("fa-angle-down");
                  icon.classList.toggle("fa-angle-up");

                  if (content.style.display === "flex") {
                    content.style.display = "none";
                  } else {
                    content.style.display = "flex";
                  }

                  if (!bibtex.textContent) {
                    const file = btn.dataset.bib;
                    console.log(file);

                    try {
                      const response = await fetch(file);
                      const text = await response.text();
                      bibtex.textContent = text;
                    } catch (err) {
                      bibtex.textContent = "Failed to load bibliography.";
                    }
                  }
                });
            }

            var copyBtns = document.getElementsByClassName("copy-bib-btn");
            for (var i = 0; i < copyBtns.length; i++) {
                const copyBtn = copyBtns[i];
                copyBtn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    const bibtex = copyBtn.closest(".bib-content").querySelector("code");
                    console.log("copy clicked, text:", bibtex.textContent);
                    navigator.clipboard.writeText(bibtex.textContent).then(() => {
                        copyBtn.innerHTML = '<i class="fa-solid fa-xl fa-check"></i>';
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i class="fa-regular fa-xl fa-copy"></i>';
                        }, 2000);
                    }).catch(err => {
                        console.error("Clipboard failed:", err);
                    });
                });
            }

            i = 0;

            var coll = document.getElementsByClassName("collapsible");
            var i;

            for (i = 0; i < coll.length; i++) {
              coll[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var content = this.nextElementSibling;
                if (content.style.display === "block") {
                  content.style.display = "none";
                } else {
                  content.style.display = "block";
                }
              });
            }
        </script>
